syntax = "proto3";
// 注意：sing-box 在 init() 里把 ServiceDesc.ServiceName 改成了
// v2ray.core.app.stats.command.StatsService（兼容 v2ray 客户端），
// 所以这里必须用这个 package，否则 gRPC 会返回 Unimplemented。
package v2ray.core.app.stats.command;

message GetStatsRequest  { string name = 1; bool reset = 2; }
message Stat             { string name = 1; int64 value  = 2; }
message GetStatsResponse { Stat stat = 1; }
message QueryStatsRequest {
  string pattern = 1; bool reset = 2;
  repeated string patterns = 3; bool regexp = 4;
}
message QueryStatsResponse { repeated Stat stat = 1; }
message SysStatsRequest  {}
message SysStatsResponse { uint32 NumGoroutine = 1; uint64 Uptime = 10; }

service StatsService {
  rpc GetStats    (GetStatsRequest)   returns (GetStatsResponse);
  rpc QueryStats  (QueryStatsRequest) returns (QueryStatsResponse);
  rpc GetSysStats (SysStatsRequest)   returns (SysStatsResponse);
}
