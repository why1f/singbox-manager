name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            cross: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl + protoc deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: pkg
        run: |
          BIN=target/${{ matrix.target }}/release/sb
          strip "$BIN" || true
          NAME=sb-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p dist/$NAME
          cp "$BIN" dist/$NAME/sb
          cp config.toml sb-manager.service install.sh install-release.sh README.md dist/$NAME/
          tar -C dist -czf dist/$NAME.tar.gz $NAME
          ( cd dist && sha256sum $NAME.tar.gz > $NAME.tar.gz.sha256 )
          echo "asset=dist/$NAME.tar.gz"        >> "$GITHUB_OUTPUT"
          echo "sha=dist/$NAME.tar.gz.sha256"  >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: sb-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.sha }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
