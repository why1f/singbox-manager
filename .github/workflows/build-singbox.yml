name: build-singbox

on:
  schedule:
    - cron: "17 8 * * *"      # 每天 UTC 08:17 检查一次
  workflow_dispatch:
    inputs:
      version:
        description: "强制构建指定 sing-box tag (例如 v1.10.3；留空则取 upstream latest)"
        required: false
      force:
        description: "即使 release 已存在也重建（会覆盖同 tag 的 release）"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version:  ${{ steps.pick.outputs.version }}
      tag:      ${{ steps.pick.outputs.tag }}
      skip:     ${{ steps.check.outputs.skip }}
    steps:
      - id: pick
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          fi
          case "$V" in v*) ;; *) V="v$V";; esac
          echo "version=$V"          >> "$GITHUB_OUTPUT"
          echo "tag=singbox-$V"      >> "$GITHUB_OUTPUT"

      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE:    ${{ github.event.inputs.force }}
        run: |
          TAG="${{ steps.pick.outputs.tag }}"
          if [ "$FORCE" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "force=true → 重建 $TAG"
            exit 0
          fi
          if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "$TAG 已存在，跳过（用 Run workflow 勾选 force 可强制重建）"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "$TAG 不存在，执行构建"
          fi

  build:
    needs: resolve
    if: needs.resolve.outputs.skip == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            target: linux-amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            target: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - name: Clone sing-box source
        run: |
          git clone --depth 1 --branch "$VERSION" https://github.com/SagerNet/sing-box.git sb-src

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: sb-src/go.sum

      - name: Resolve tags & ldflags from upstream release config
        id: meta
        working-directory: sb-src
        run: |
          # 使用 upstream release/DEFAULT_BUILD_TAGS —— 与官方 release 一致
          if [ -f release/DEFAULT_BUILD_TAGS ]; then
            default_tags=$(tr '\n' ',' < release/DEFAULT_BUILD_TAGS | sed 's/,$//')
          else
            # fallback（旧版本可能没这个文件）
            default_tags="with_quic,with_grpc,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_gvisor,with_tailscale"
          fi
          # 追加我们自己的 tag；with_purego 让 naive 免 CGO
          final_tags=$(printf '%s\nwith_v2ray_api\nwith_purego\n' "$default_tags" \
            | tr ',' '\n' | awk 'NF && !seen[$0]++' | paste -sd',' -)

          # upstream ldflags + 写入版本号
          if [ -f release/LDFLAGS ]; then
            base_ldflags=$(tr '\n' ' ' < release/LDFLAGS | sed 's/  */ /g')
          else
            base_ldflags="-s -w -buildid="
          fi
          VER="${VERSION#v}"
          final_ldflags="-X 'github.com/sagernet/sing-box/constant.Version=$VER' $base_ldflags"

          echo "tags=$final_tags" >> "$GITHUB_OUTPUT"
          echo "ldflags=$final_ldflags" >> "$GITHUB_OUTPUT"
          echo "===== tags ====="; echo "$final_tags"
          echo "===== ldflags ====="; echo "$final_ldflags"

      - name: Build
        working-directory: sb-src
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -v -trimpath \
            -tags "${{ steps.meta.outputs.tags }}" \
            -ldflags "${{ steps.meta.outputs.ldflags }}" \
            -o sing-box ./cmd/sing-box
          ls -lh sing-box

      - name: Verify binary (only on native arch)
        if: matrix.target == 'linux-amd64' || matrix.target == 'linux-arm64'
        working-directory: sb-src
        run: |
          chmod +x sing-box
          ./sing-box version
          ./sing-box version | grep -q "${VERSION#v}" || { echo "version 字串不匹配"; exit 1; }
          ./sing-box version | grep -q "with_v2ray_api" || { echo "缺 with_v2ray_api tag"; exit 1; }

      - name: Package
        run: |
          NAME="sing-box-${VERSION}-${{ matrix.target }}-v2rayapi"
          mkdir -p dist/$NAME
          cp sb-src/sing-box dist/$NAME/sing-box
          cp sb-src/release/config/sing-box.service dist/$NAME/ 2>/dev/null || true
          cp sb-src/LICENSE                          dist/$NAME/ 2>/dev/null || true
          # 打包
          tar -C dist -czf dist/$NAME.tar.gz $NAME
          # 也输出裸 binary，方便 wget + chmod 直接用
          cp sb-src/sing-box dist/sing-box-${VERSION}-${{ matrix.target }}
          ( cd dist && sha256sum $NAME.tar.gz sing-box-${VERSION}-${{ matrix.target }} > $NAME.sha256 )
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/sing-box-*
            dist/*.sha256

  release:
    needs: [resolve, build]
    if: needs.resolve.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -lh dist/

      - name: Delete existing release (for force rebuild)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE:    ${{ github.event.inputs.force }}
        run: |
          if [ "$FORCE" = "true" ]; then
            TAG="${{ needs.resolve.outputs.tag }}"
            echo "force=true，删除旧 release + tag $TAG"
            gh release delete "$TAG" -R "${{ github.repository }}" --yes --cleanup-tag || true
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: "sing-box ${{ needs.resolve.outputs.version }} (with v2ray_api)"
          body: |
            基于官方 [SagerNet/sing-box ${{ needs.resolve.outputs.version }}](https://github.com/SagerNet/sing-box/releases/tag/${{ needs.resolve.outputs.version }}) 源码，使用 upstream `release/DEFAULT_BUILD_TAGS` + `release/LDFLAGS`，追加 `with_v2ray_api` 与 `with_purego` 构建。

            与官方 release 的主要区别：启用了 `experimental.v2ray_api`，供 [singbox-manager](https://github.com/${{ github.repository }}) 的流量统计使用。其余 tag 与 `with_naive_outbound` 等保持 upstream 默认。

            **产物**
            - `sing-box-<version>-linux-<arch>-v2rayapi.tar.gz` — 打包含 service/LICENSE
            - `sing-box-<version>-linux-<arch>` — 裸 binary，可直接 `chmod +x` 运行
            - `<...>.sha256` — 校验
          files: dist/*
          make_latest: "false"
